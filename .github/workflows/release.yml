name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  test:
    uses: ./.github/workflows/test.yml

  determine-release-type:
    name: Determine release type
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.check.outputs.label }}
      is_stable: ${{ steps.check.outputs.is_stable }}
    steps:
    - name: Detect release type
      id: check
      run: |
        if [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "label=" >> $GITHUB_OUTPUT
          echo "is_stable=true" >> $GITHUB_OUTPUT
        else
          echo "label=--label dev" >> $GITHUB_OUTPUT
          echo "is_stable=false" >> $GITHUB_OUTPUT
        fi

  publish-conda-pkg-to-anaconda-dot-org:
    name: Publish conda package to Anaconda.org
    runs-on: ubuntu-latest
    needs: [test, determine-release-type]
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - name: Create build environment
      run: |
        source $CONDA/bin/activate
        conda create -n build --file ./etc/build.linux-64.lock
    - name: Download the build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: conda-${{ github.sha }}
        path: ./conda-bld
    - name: publish
      env:
        TOKEN: ${{ secrets.ANACONDA_ORG_UPLOAD_TOKEN }}
      run: |
        source $CONDA/bin/activate && conda activate build
        anaconda --verbose \
          --token $TOKEN \
          upload \
          --user anaconda-cloud \
          ${{ needs.determine-release-type.outputs.label }} \
          --force \
          ./conda-bld/noarch/anaconda-*

  publish-wheel-to-anaconda-dot-org:
    name: Publish wheel to Anaconda.org
    runs-on: ubuntu-latest
    needs: [test, determine-release-type]
    steps:
    - name: Retrieve the source code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - name: Download the build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: wheel-${{ github.sha }}
        path: ./dist
    - name: Create build environment
      run: |
        source $CONDA/bin/activate
        conda create -n build --file ./etc/build.linux-64.lock
    - name: Upload to anaconda.org
      env:
        TOKEN: ${{ secrets.ANACONDA_ORG_UPLOAD_TOKEN }}
      run: |
        source $CONDA/bin/activate && conda activate build
        anaconda --verbose \
          --token $TOKEN \
          upload \
          --user anaconda-cloud \
          ${{ needs.determine-release-type.outputs.label }} \
          --force \
          ./dist/*.whl

  publish-to-pypi:
    name: Publish to PyPI
    needs: [test, determine-release-type]
    if: needs.determine-release-type.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
    - name: Download the build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: wheel-${{ github.sha }}
        path: ./dist
    - name: Create build environment
      run: |
        source $CONDA/bin/activate
        conda create -n build --file ./etc/build.linux-64.lock
    - name: Upload to PyPI with twine
      run: |
        source $CONDA/bin/activate && conda activate build
        twine upload ./dist/*
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
